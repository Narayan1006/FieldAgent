name: field_agent
description: FieldAgent — Offline-first workflow agent for ASHA workers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.9

  # Connectivity
  connectivity_plus: ^6.1.3

  # On-device AI
  flutter_gemma: ^0.14.1

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Speech
  speech_to_text: ^7.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.3.1

  # State
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
